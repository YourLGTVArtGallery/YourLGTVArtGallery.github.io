<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Connect to TV Art</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #000;
      --text: #fff;
      --text-dim: #888;
      --border: #222;
      --accent: #fff;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 17px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .page {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      max-width: 480px;
      margin: 0 auto;
      padding: 48px 24px;
      width: 100%;
    }

    .back {
      display: inline-block;
      font-size: 13px;
      color: var(--text-dim);
      text-decoration: none;
      border-bottom: 1px solid #222;
      margin-bottom: 48px;
      padding-bottom: 2px;
    }
    .back:hover { color: var(--text); border-bottom-color: var(--text); }

    .logo {
      font-weight: 900;
      font-size: 28px;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 15px;
      color: var(--text-dim);
      margin-bottom: 48px;
    }

    .code-display {
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    .code-value {
      font-size: 36px;
      font-weight: 300;
      letter-spacing: 0.25em;
      color: var(--text);
      margin-bottom: 40px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 10px;
    }

    textarea {
      display: block;
      width: 100%;
      padding: 16px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 16px;
      line-height: 1.5;
      resize: none;
      height: 90px;
      margin-bottom: 24px;
      outline: none;
      -webkit-appearance: none;
    }
    textarea:focus { border-color: #555; }
    textarea::placeholder { color: #444; }

    .btn-send {
      display: block;
      width: 100%;
      padding: 16px;
      background: var(--text);
      color: var(--bg);
      font-family: 'Jost', sans-serif;
      font-weight: 400;
      font-size: 16px;
      letter-spacing: 0.06em;
      border: none;
      cursor: pointer;
      -webkit-appearance: none;
    }
    .btn-send:active { opacity: 0.85; }
    .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }

    .status {
      margin-top: 20px;
      font-size: 15px;
      min-height: 24px;
    }
    .status.success { color: #6be06b; }
    .status.error { color: #e06b6b; }

    footer {
      text-align: center;
      padding: 24px;
      font-size: 13px;
      color: #333;
    }
    footer a { color: #555; text-decoration: none; }
    footer a:hover { color: var(--text); }
  </style>
</head>
<body>

<div class="page">
  <a class="back" href="index.html">← TV Art</a>

  <p class="logo">TV Art</p>
  <p class="subtitle">Connect your photo library to the TV.</p>

  <div id="no-code" hidden>
    <p style="color:#888; font-size:15px;">No pairing code found.<br>Please scan the QR code shown on your TV.</p>
  </div>

  <div id="main-form">
    <p class="code-display">TV code</p>
    <p class="code-value" id="code-display">— — — — — —</p>

    <label for="url-input">Paste your share link</label>
    <textarea id="url-input" placeholder="https://share.mylio.com/…" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>

    <button class="btn-send" id="btn-send">Send to TV</button>
    <p class="status" id="status"></p>
  </div>
</div>

<footer>
  <a href="index.html">TV Art</a> &middot; <a href="privacy.html">Privacy</a>
</footer>

<script>
(function() {
  var WORKER_BASE = 'https://tvart-pair.yourlgtvartgallery.workers.dev';

  var params = new URLSearchParams(window.location.search);
  var code = params.get('code');

  var mainForm = document.getElementById('main-form');
  var noCode = document.getElementById('no-code');
  var codeDisplay = document.getElementById('code-display');
  var urlInput = document.getElementById('url-input');
  var sendBtn = document.getElementById('btn-send');
  var statusEl = document.getElementById('status');

  if (!code || !/^\d{6}$/.test(code)) {
    if (mainForm) mainForm.hidden = true;
    if (noCode) noCode.hidden = false;
    return;
  }

  if (codeDisplay) {
    codeDisplay.textContent = code.slice(0, 3) + ' ' + code.slice(3);
  }

  if (sendBtn) {
    sendBtn.addEventListener('click', function() {
      var url = urlInput ? urlInput.value.trim() : '';
      if (!url) {
        statusEl.className = 'status error';
        statusEl.textContent = 'Please paste a share link first.';
        return;
      }

      sendBtn.disabled = true;
      statusEl.className = 'status';
      statusEl.textContent = 'Sending…';

      fetch(WORKER_BASE + '/pair/' + code, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: url }),
      })
        .then(function(r) {
          if (!r.ok) throw new Error('Server error ' + r.status);
          return r.json();
        })
        .then(function() {
          statusEl.className = 'status success';
          statusEl.textContent = 'Sent! Your TV will connect in a moment.';
          sendBtn.disabled = false;
        })
        .catch(function(e) {
          statusEl.className = 'status error';
          statusEl.textContent = 'Could not reach the pairing server. Check your internet and try again.';
          sendBtn.disabled = false;
        });
    });
  }
})();
</script>

</body>
</html>
